<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="src/style/main.scss" />
		<title>Pokemon Generator</title>
	</head>
	<body>
		<header class="header">
			<nav>
				<ul class="header-list">
					<li class="header-element1">Generate your own pokemons team</li>
					<button class="header-element2" id="generateBtn">Generate</button>
				</ul>
			</nav>
		</header>

		<main class="main">
			<nav class="main-sidenav">
				<ul class="main-list" id="filters">
					<li class="sidenav-title-filter">
						<p class="sidenav-title">Filters</p>
						<div class="sidenav-title-round"></div>
					</li>

					<li class="sidenav-filter custom-select">
						<div class="sidenav-text select-trigger" id="gameTrigger">
							All games
						</div>
						<div class="select-dropdown" id="gameDropdown">
							<label
								><input type="radio" name="gameFilter" value="" checked /> All
								games</label
							>
							<label
								><input type="radio" name="gameFilter" value="red" />
								Red/Blue/Yellow</label
							>
							<label
								><input type="radio" name="gameFilter" value="firered" />
								FireRed/LeafGreen</label
							>
							<label
								><input type="radio" name="gameFilter" value="gold" />
								Gold/Silver/Crystal</label
							>
							<label
								><input type="radio" name="gameFilter" value="heartgold" />
								HeartGold/SoulSilver</label
							>
							<label
								><input type="radio" name="gameFilter" value="ruby" />
								Ruby/Sapphire/Emerald</label
							>
							<label
								><input type="radio" name="gameFilter" value="omegaa" />
								Omega Ruby/Alpha Sapphire</label
							>
							<label
								><input type="radio" name="gameFilter" value="diamond" />
								Diamond/Pearl/Platinum</label
							>
							<label
								><input type="radio" name="gameFilter" value="bdsp" />
								Brilliant Diamond/Shining Pearl</label
							>
							<label
								><input type="radio" name="gameFilter" value="black" />
								Black/White/Black 2/White 2</label
							>
							<label
								><input type="radio" name="gameFilter" value="xy" /> X/Y</label
							>
							<label
								><input type="radio" name="gameFilter" value="sun" />
								Sun/Moon/Ultra Sun/Ultra Moon</label
							>
							<label
								><input type="radio" name="gameFilter" value="sword" />
								Sword/Shield</label
							>
							<label
								><input type="radio" name="gameFilter" value="scarlet" />
								Scarlet/Violet</label
							>
						</div>
						<div class="sidenav-round"></div>
					</li>

					<li class="sidenav-filter custom-select">
						<div class="sidenav-text select-trigger" id="genTrigger">
							Select...
						</div>
						<div class="select-dropdown" id="genDropdown">
							<label><input type="checkbox" value="1" /> Gen 1</label>
							<label><input type="checkbox" value="2" /> Gen 2</label>
							<label><input type="checkbox" value="3" /> Gen 3</label>
							<label><input type="checkbox" value="4" /> Gen 4</label>
							<label><input type="checkbox" value="5" /> Gen 5</label>
							<label><input type="checkbox" value="6" /> Gen 6</label>
							<label><input type="checkbox" value="7" /> Gen 7</label>
							<label><input type="checkbox" value="8" /> Gen 8</label>
							<label><input type="checkbox" value="9" /> Gen 9</label>
						</div>
						<div class="sidenav-round"></div>
					</li>

					<li class="sidenav-filter custom-select">
						<div class="sidenav-text select-trigger" id="typeTrigger">
							Select...
						</div>
						<div class="select-dropdown" id="typeDropdown">
							<label><input type="checkbox" value="normal" /> Normal</label>
							<label><input type="checkbox" value="fire" /> Fire</label>
							<label><input type="checkbox" value="water" /> Water</label>
							<label><input type="checkbox" value="electric" /> Electric</label>
							<label><input type="checkbox" value="grass" /> Grass</label>
							<label><input type="checkbox" value="ice" /> Ice</label>
							<label><input type="checkbox" value="fighting" /> Fighting</label>
							<label><input type="checkbox" value="poison" /> Poison</label>
							<label><input type="checkbox" value="ground" /> Ground</label>
							<label><input type="checkbox" value="flying" /> Flying</label>
							<label><input type="checkbox" value="psychic" /> Psychic</label>
							<label><input type="checkbox" value="bug" /> Bug</label>
							<label><input type="checkbox" value="rock" /> Rock</label>
							<label><input type="checkbox" value="ghost" /> Ghost</label>
							<label><input type="checkbox" value="dragon" /> Dragon</label>
							<label><input type="checkbox" value="dark" /> Dark</label>
							<label><input type="checkbox" value="steel" /> Steel</label>
							<label><input type="checkbox" value="fairy" /> Fairy</label>
						</div>
						<div class="sidenav-round"></div>
					</li>

					<li class="sidenav-filter custom-select">
						<div class="sidenav-text select-trigger" id="evoTrigger">
							Select...
						</div>
						<div class="select-dropdown" id="evoDropdown">
							<label><input type="checkbox" value="base" /> Base</label>
							<label><input type="checkbox" value="middle" /> Middle</label>
							<label><input type="checkbox" value="final" /> Final</label>
						</div>
						<div class="sidenav-round"></div>
					</li>
				</ul>
			</nav>

			<section class="main-section">
				<div class="main-section-content">
					<ul class="main-section-list" id="team"></ul>
				</div>
			</section>
		</main>

		<footer class="footer">
			<p>Data from PokéAPI</p>
		</footer>
		<script type="module">
			import { init } from '/src/scripts/main.js';
			init();
		</script>
	</body>
</html>
